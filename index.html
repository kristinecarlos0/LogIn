<!DOCTYPE html><html lang="en">
<head>    
    <meta charset="UTF-8">    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">    
    <title>Glassmorphism Auth</title>    
    <link rel="stylesheet" href="login_logout.css">    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" /></head>
<body>    
    <div class="background-decor">        
        <div class="circle circle-1"></div>        
        <div class="circle circle-2"></div>    
    </div>
    
    <div class="login-container">        
        <h2>Welcome Back</h2>        
        <p class="subtitle">Sign in to continue</p>
        
        <form id="login-form">            
            <div class="input-group">                
                <span class="material-symbols-outlined">mail</span>                
                <input type="email" id="email" placeholder="Email" required>            
            </div>            
            <div class="input-group">                
                <span class="material-symbols-outlined">lock</span>                
                <input type="password" id="password" placeholder="Password" required>            
            </div>            
            <button type="submit" class="btn-primary">Sign In</button>        
        </form>
        
        <div class="separator">            
            <span>or</span>        
        </div>
        
        <button id="google-btn" class="btn-google">            
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google logo">            
            Sign in with Google        
        </button>                
        <p id="auth-status" class="status-msg"></p>    
    </div>

    <script type="module">                
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import {     
            getAuth,     
            signInWithEmailAndPassword,     
            GoogleAuthProvider,     
            signInWithPopup 
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {  
            apiKey: "AIzaSyCanFY3gS6D99VLmZZC17H1wGBdKx7hQcI",  
            authDomain: "kristine---software-eng.firebaseapp.com",  
            projectId: "kristine---software-eng",  
            storageBucket: "kristine---software-eng.firebasestorage.app",  
            messagingSenderId: "1033582996894",  
            appId: "1:1033582996894:web:8675e8893e7c4c08ce7a8f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const googleProvider = new GoogleAuthProvider();

        const loginForm = document.getElementById('login-form');
        const googleBtn = document.getElementById('google-btn');
        const statusMsg = document.getElementById('auth-status');

        // Email Login -> Redirects to home.html
        loginForm.addEventListener('submit', (e) => {    
            e.preventDefault();    
            const email = document.getElementById('email').value;    
            const password = document.getElementById('password').value;
            statusMsg.style.color = '#a78bfa';    
            statusMsg.innerText = "Signing in...";

            signInWithEmailAndPassword(auth, email, password)        
                .then(() => {            
                    window.location.href = "home.html"; // <-- REDIRECT HERE
                })        
                .catch((error) => {            
                    statusMsg.style.color = '#f87171';            
                    statusMsg.innerText = error.message;        
                });
        });

        // Google Sign-In -> Redirects to home.html
        googleBtn.addEventListener('click', () => {    
            statusMsg.style.color = '#a78bfa';    
            statusMsg.innerText = "Connecting to Google...";

            signInWithPopup(auth, googleProvider)        
                .then(() => {            
                    window.location.href = "home.html"; // <-- REDIRECT HERE
                })        
                .catch((error) => {            
                    statusMsg.style.color = '#f87171';            
                    statusMsg.innerText = error.message;        
                });
        });
    </script>
</body>
</html>
